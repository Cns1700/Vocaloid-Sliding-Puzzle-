    <link rel="stylesheet" href="style_sheet.css">

<body>

    <header>
        <h1>VOCALOID PUZZLE GALLERY</h1>

                <a href="workspace_template.html?char=miku-original&puzzle=Cyber-Miku-Revamped2-1.jpg" class="thumb-link">
                    <img src="Puzzles/Hatsune-Miku/Hatsune-Miku-images/Cyber-Miku-Revamped2-1.jpg" alt="Cyber Miku Bike" class="thumb-img">
                </a>
                <a href="workspace_template.html?char=miku-original&puzzle=Cyber_Miku-Weapon_Engage.jpg" class="thumb-link">

                <a href="workspace_template.html?char=miku-original&puzzle=Miku_Witch.jpg" class="thumb-link">
